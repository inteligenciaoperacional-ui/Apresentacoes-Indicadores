<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="https://res.cloudinary.com/dln0ctawv/image/upload/v1781288131/Intelig%C3%AAncia_branco_m524fk_pmmcig.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JCA — Plano de Ação · Multas Regulatórias</title>
  <style>
    :root { --navy:#1d3061; --red:#c0392b; --border:#e0e0e0; --bg:#f5f6fa; --muted:#888; }
    *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:system-ui,sans-serif; background:var(--bg); color:#333; }

    .header { background:var(--navy); padding:14px 24px; display:flex; align-items:center; gap:16px; }
    .header img.logo-jca { height:32px; }
    .header__title { color:white; font-weight:700; font-size:15px; }
    .header__right { margin-left:auto; display:flex; align-items:center; gap:10px; }
    .header select { padding:5px 10px; border-radius:6px; border:none; font-size:13px; }
    .header label  { color:rgba(255,255,255,.7); font-size:11px; margin:0; }

    .container { max-width:860px; margin:28px auto; padding:0 16px 60px; }

    .emp-card { background:white; border-radius:12px; padding:22px; margin-bottom:18px; box-shadow:0 1px 6px rgba(0,0,0,.06); }
    .emp-logo { height:38px; object-fit:contain; margin-bottom:14px; display:block; }

    .motivos-box { background:#f8f8f8; border:1px solid var(--border); border-radius:8px; padding:12px 16px; margin-bottom:16px; }
    .motivos-titulo { font-size:10px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.4px; margin-bottom:8px; }
    .motivo-item { display:flex; align-items:baseline; gap:8px; padding:4px 0; border-bottom:1px solid #eee; font-size:13px; }
    .motivo-item:last-child { border-bottom:none; }
    .motivo-qtde { background:var(--navy); color:#fff; font-size:10px; font-weight:700; padding:2px 7px; border-radius:20px; flex-shrink:0; }
    .motivo-desc { flex:1; font-weight:500; }
    .motivo-val  { color:var(--red); font-weight:700; font-size:12px; flex-shrink:0; }

    label.field-label { display:block; font-size:10px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.4px; margin-bottom:6px; }
    textarea { width:100%; padding:10px 12px; border:1.5px solid var(--border); border-radius:8px; font-size:13px; font-family:inherit; color:var(--navy); resize:vertical; outline:none; line-height:1.6; }
    textarea:focus { border-color:var(--navy); }
    textarea:disabled { background:#f5f5f5; color:#999; cursor:not-allowed; }

    .send-row { display:flex; align-items:center; gap:12px; margin-top:14px; }
    .btn-enviar { padding:10px 28px; border-radius:8px; border:none; font-size:13px; font-family:inherit; cursor:pointer; font-weight:700; background:var(--navy); color:white; }
    .btn-enviar:hover { opacity:.88; }
    .btn-enviar:disabled { background:#aaa; cursor:not-allowed; }
    .send-status { font-size:12px; font-weight:600; }
    .send-status.ok  { color:#1a7a3c; }
    .send-status.err { color:var(--red); }

    .loading { text-align:center; padding:40px; color:var(--muted); font-size:14px; }
    footer { text-align:center; color:var(--muted); font-size:11px; margin-top:32px; }
  </style>
</head>
<body>

<div class="header">
  <img class="logo-jca" src="https://res.cloudinary.com/dln0ctawv/image/upload/v1779238658/JCA_1_mp1ic7.png" alt="JCA">
  <span class="header__title">Plano de Ação — Multas Regulatórias</span>
  <div class="header__right">
    <label>MÊS</label>
    <select id="sel-mes"></select>
    <label>ANO</label>
    <select id="sel-ano"></select>
  </div>
</div>

<div class="container" id="container">
  <div class="loading">Carregando dados...</div>
</div>

<footer>JCA — Inteligência Operacional · Plano de Ação · Multas Regulatórias</footer>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script>
// ── Firebase ────────────────────────────────────────────
firebase.initializeApp({
  apiKey:            "AIzaSyBoAgfudElHnMLPF9i9aplwc2sd9-zmT3E",
  authDomain:        "apresentacoes-indicadores.firebaseapp.com",
  projectId:         "apresentacoes-indicadores",
  storageBucket:     "apresentacoes-indicadores.firebasestorage.app",
  messagingSenderId: "508186104156",
  appId:             "1:508186104156:web:a52ab3848db24c7555b199"
});
var db = firebase.firestore();

// Coleções
var COL_DADOS   = "multas_regulatorias";  // onde os motivos estão
var COL_PLANOS  = "planos_multas";        // onde as respostas vão

// Dados
// ── EmailJS config — substitua pelos seus IDs ──────────────
var EMAILJS_SERVICE_ID  = 'service_0kojgve';
var EMAILJS_TEMPLATE_ID = 'template_ddaj648';
var EMAILJS_PUBLIC_KEY  = '9rWOQnvMgz5XPEP1v';

var EMAIL_DESTINO = 'inteligenciaoperacional@viacaocometa.com.br';

var EMPRESA_NOME = {
  '1001':  'Auto Viação 1001',
  '1001u': 'Auto Viação 1001 Urbano',
  'cat':   'Auto Viação Catarinense',
  'com':   'Viação Cometa'
};

var MESES_ABREV = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
var MESES_FULL  = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];

var EMPS = [
  { id:"1001",  logo:"https://res.cloudinary.com/dln0ctawv/image/upload/v1779671790/1001_qisjtr_1_pzpzqw.png" },
  { id:"1001u", logo:"https://res.cloudinary.com/dln0ctawv/image/upload/v1781307419/1001_URB_m1lbdu.png" },
  { id:"cat",   logo:"https://res.cloudinary.com/dln0ctawv/image/upload/v1779671813/AVC_zk4pe9_k4jgau.png" },
  { id:"com",   logo:"https://res.cloudinary.com/dln0ctawv/image/upload/v1779671826/COM_folzln_ddghpr.png" }
];

function fmtMoeda(v) {
  if (!v) return "";
  return "R$ " + Number(v).toLocaleString("pt-BR", {minimumFractionDigits:2, maximumFractionDigits:2});
}

// ── Seletores de período (padrão: mês anterior) ─────────
var now        = new Date();
var mesPadrao  = now.getMonth() === 0 ? 11 : now.getMonth() - 1;
var anoPadrao  = now.getMonth() === 0 ? now.getFullYear() - 1 : now.getFullYear();

var selMes = document.getElementById("sel-mes");
var selAno = document.getElementById("sel-ano");

MESES_FULL.forEach(function(nome, i) {
  var opt = document.createElement("option");
  opt.value = i; opt.textContent = nome;
  if (i === mesPadrao) opt.selected = true;
  selMes.appendChild(opt);
});

[now.getFullYear() - 1, now.getFullYear()].forEach(function(a) {
  var opt = document.createElement("option");
  opt.value = a; opt.textContent = a;
  if (a === anoPadrao) opt.selected = true;
  selAno.appendChild(opt);
});

selMes.addEventListener("change", carregarDados);
selAno.addEventListener("change", carregarDados);

// ── Carregar dados ──────────────────────────────────────
// ── Enviar email de notificação via EmailJS ─────────────────
function _enviarEmailNotificacao(empId, docId) {
  if (!EMAILJS_SERVICE_ID || EMAILJS_SERVICE_ID === 'SEU_SERVICE_ID') {
    console.log('[EmailJS] Não configurado — email não enviado');
    return;
  }
  var mesIdx  = parseInt(docId.split('-')[1]) - 1;
  var ano     = docId.split('-')[0];
  var mesNome = MESES_FULL[mesIdx] || '';
  var empresa = EMPRESA_NOME[empId] || empId;

  var params = {
    to_email: EMAIL_DESTINO,
    empresa:  empresa,
    mes:      mesNome + ' de ' + ano,
    mensagem: 'Prezados, boa tarde.\n\nPlano de ação de Multas Regulatórias da ' + empresa
              + ', referente ao mês de ' + mesNome + ' de ' + ano
              + ', foi preenchido.'
  };

  emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, params)
    .then(function() {
      console.log('[EmailJS] Email enviado para', EMAIL_DESTINO);
    })
    .catch(function(err) {
      console.warn('[EmailJS] Erro ao enviar email:', err);
    });
}

function carregarDados() {
  var mesIdx = parseInt(selMes.value);
  var ano    = selAno.value;
  var mesNum = mesIdx + 1;
  var docId  = ano + "-" + (mesNum < 10 ? "0" + mesNum : mesNum);
  var mesLabel = MESES_ABREV[mesIdx] + "/" + ano;

  document.getElementById("container").innerHTML = '<div class="loading">Carregando...</div>';

  // Carrega motivos (multas_regulatorias) e respostas (planos_multas) em paralelo
  Promise.all([
    db.collection(COL_DADOS).doc(docId).get().catch(function(e) { console.warn("dados:", e); return null; }),
    db.collection(COL_PLANOS).doc(docId).get().catch(function(e) { console.warn("planos:", e); return null; })
  ]).then(function(results) {
    var dadosSnap  = results[0];
    var planosSnap = results[1];

    var dadosEmp  = (dadosSnap  && dadosSnap.exists)  ? (dadosSnap.data().dados  || {}) : {};
    var planosEmp = (planosSnap && planosSnap.exists)  ? (planosSnap.data()       || {}) : {};

    var html = EMPS.map(function(emp) {
      var d       = dadosEmp[emp.id]  || {};
      var p       = planosEmp[emp.id] || {};
      var motivos = (d.motivos || []).filter(function(m) { return m.descricao; });
      var enviado = !!p.enviado;
      var texto   = p.resposta || p.texto || "";

      var motivosHTML = motivos.length
        ? motivos.map(function(m) {
            var qtd = parseInt(m.qtde) || 0;
            return '<div class="motivo-item">'
              + '<span class="motivo-qtde">' + (qtd < 10 ? "0" + qtd : qtd) + '</span>'
              + '<span class="motivo-desc">' + (m.descricao || "") + '</span>'
              + (m.valor ? '<span class="motivo-val">' + fmtMoeda(m.valor) + '</span>' : '')
              + '</div>';
          }).join("")
        : '<div style="color:#bbb;font-style:italic;font-size:13px;">Sem motivos registrados para este período</div>';

      return '<div class="emp-card" id="card-' + emp.id + '">'
        + '<img src="' + emp.logo + '" class="emp-logo" alt="' + emp.id + '">'
        + '<div class="motivos-box">'
        +   '<div class="motivos-titulo">Motivos — ' + mesLabel + '</div>'
        +   motivosHTML
        + '</div>'
        + '<label class="field-label">Plano de Ação (uma ação por linha)</label>'
        + '<textarea id="txt-' + emp.id + '" rows="5"' + (enviado ? ' disabled' : '')
        +   ' placeholder="Convocação dos motoristas envolvidos;\nTreinamento sobre regulamentação;">'
        +   texto
        + '</textarea>'
        + (enviado
            ? '<p style="color:#1a7a3c;font-size:12px;margin-top:8px;font-weight:600;">✅ Plano enviado com sucesso.</p>'
            : '<div class="send-row">'
            +   '<button class="btn-enviar" onclick="enviar(\'' + emp.id + '\',\'' + docId + '\')">Enviar</button>'
            +   '<span class="send-status" id="status-' + emp.id + '"></span>'
            + '</div>'
          )
        + '</div>';
    }).join("");

    document.getElementById("container").innerHTML = html;
  });
}

// ── Enviar plano ────────────────────────────────────────
function enviar(empId, docId) {
  var txt    = document.getElementById("txt-" + empId);
  var btn    = txt.closest(".emp-card").querySelector(".btn-enviar");
  var status = document.getElementById("status-" + empId);

  if (!txt.value.trim()) {
    status.textContent = "⚠️ Preencha ao menos uma ação.";
    status.className   = "send-status err";
    return;
  }

  btn.disabled = true; btn.textContent = "Enviando...";
  status.textContent = "";

  var update = {};
  update[empId + ".resposta"]  = txt.value.trim();
  update[empId + ".texto"]     = txt.value.trim();
  update[empId + ".enviado"]   = true;
  update[empId + ".enviadoEm"] = new Date().toISOString();

  db.collection(COL_PLANOS).doc(docId).set(update, { merge: true })
    .then(function() {
      txt.disabled = true;
      var sendRow = txt.closest(".emp-card").querySelector(".send-row");
      if (sendRow) sendRow.remove();
      txt.closest(".emp-card").insertAdjacentHTML("beforeend",
        '<p style="color:#1a7a3c;font-size:12px;margin-top:8px;font-weight:600;">✅ Plano enviado com sucesso.</p>');
      // Enviar email de notificação
      _enviarEmailNotificacao(empId, docId);
    })
    .catch(function(e) {
      btn.disabled = false; btn.textContent = "Enviar";
      status.textContent = "❌ Erro: " + e.message;
      status.className = "send-status err";
    });
}

// ── Iniciar ─────────────────────────────────────────────
// Inicializa EmailJS
emailjs.init(EMAILJS_PUBLIC_KEY);

carregarDados();
</script>
</body>
</html>
