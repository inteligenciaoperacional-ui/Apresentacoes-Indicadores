<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JCA — Plano de Ação · Reclamações de Clientes</title>
  <style>
    :root { --navy:#1d3061; --red:#c0392b; --border:#e0e0e0; --bg:#f5f6fa; --muted:#888;
            --emp-color:#1d3061; --emp-light:rgba(29,48,97,.06); }
    *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:system-ui,sans-serif; background:var(--bg); color:#333; }

    .header { background:var(--navy); padding:14px 24px; display:flex; align-items:center; gap:16px; }
    .header img { height:32px; }
    .header__title { color:#fff; font-weight:700; font-size:15px; }
    .header__right { margin-left:auto; display:flex; align-items:center; gap:10px; }
    .header select { padding:5px 10px; border-radius:6px; border:none; font-size:13px; }
    .header label  { color:rgba(255,255,255,.7); font-size:11px; margin:0; }

    .container { max-width:900px; margin:28px auto; padding:0 16px 60px; }

    /* ── Card empresa ── */
    .emp-card {
      background:#fff; border-radius:14px; margin-bottom:28px;
      box-shadow:0 2px 14px rgba(0,0,0,.08); overflow:hidden;
    }
    .emp-card__top {
      display:flex; align-items:center; justify-content:space-between;
      padding:20px 24px 16px;
    }
    .emp-logo { height:40px; max-width:150px; object-fit:contain; }
    .emp-mesref { font-size:13px; color:#999; }

    /* ── Box ofensores ── */
    .ofensores-box { margin:0 24px 22px; border:1.5px solid var(--emp-color); border-radius:10px; overflow:hidden; }
    .ofensores-box__title {
      background:var(--emp-light); padding:8px 16px;
      font-size:10px; font-weight:700; color:var(--emp-color);
      text-transform:uppercase; letter-spacing:.6px; border-bottom:1px solid var(--emp-color);
    }
    .desvio-row {
      display:flex; align-items:center; gap:10px;
      padding:8px 16px; border-bottom:1px solid #f0f0f0; font-size:13px;
    }
    .desvio-row:last-child { border-bottom:none; }
    .desvio-badge {
      background:var(--emp-color); color:#fff; font-size:10px; font-weight:700;
      padding:2px 9px; border-radius:20px; min-width:28px; text-align:center; flex-shrink:0;
    }
    .desvio-desc { flex:1; font-weight:500; }
    .desvio-trat { font-size:12px; font-weight:700; color:#1a7a3c; }

    /* ── Seção label ── */
    .section-label {
      font-size:10px; font-weight:700; color:var(--emp-color);
      text-transform:uppercase; letter-spacing:.6px;
      padding:0 24px; margin-bottom:10px;
    }

    /* ── Parte 1: Identificação + Causas (dois campos lado a lado) ── */
    .desvios-section { padding:0 24px 22px; }
    .desvios-cols { display:flex; gap:16px; }
    .desvios-col {
      flex:1; border:1.5px solid var(--emp-color); border-radius:10px; overflow:hidden;
    }
    .desvios-col__header {
      background:var(--emp-color); color:#fff;
      padding:9px 14px; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.4px;
    }
    .desvios-col__body { padding:12px 14px; min-height:120px; }
    .desvios-col textarea {
      width:100%; border:none; outline:none; resize:none;
      font-size:13px; font-family:inherit; color:#333; background:transparent;
      min-height:100px; line-height:1.6;
    }
    .desvios-col textarea::placeholder { color:#bbb; }
    .desvios-col textarea:disabled { color:#888; cursor:not-allowed; }

    /* ── Parte 2: Ações (tabela) ── */
    .acoes-section { padding:0 24px 22px; }
    .acoes-section__header {
      display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;
    }
    .btn-add {
      background:var(--emp-color); color:#fff; border:none; border-radius:8px;
      padding:8px 18px; font-size:12px; font-family:inherit; font-weight:700;
      cursor:pointer; transition:opacity .2s;
    }
    .btn-add:hover { opacity:.85; }

    .acoes-table { width:100%; border-collapse:collapse; font-size:13px; }
    .acoes-table thead tr { background:var(--emp-color); }
    .acoes-table th {
      padding:9px 12px; text-align:left; color:#fff;
      font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.3px;
    }
    .acoes-table th.center { text-align:center; }
    .acoes-table td { padding:7px 8px; border-bottom:1px solid #f0f0f0; vertical-align:middle; }
    .acoes-table tr:nth-child(even) td { background:#fafafa; }

    .acoes-table textarea,
    .acoes-table input[type="text"] {
      width:100%; border:1.5px solid #e0e0e0; border-radius:6px;
      padding:7px 10px; font-size:13px; font-family:inherit; color:#333;
      outline:none; background:#fff; resize:none; transition:border-color .2s;
    }
    .acoes-table textarea:focus,
    .acoes-table input:focus { border-color:var(--emp-color); }
    .acoes-table textarea { min-height:38px; overflow:hidden; }

    .col-acao  { }
    .col-resp  { width:160px; }
    .col-prazo { width:120px; }
    .col-rm    { width:40px; text-align:center; }

    .btn-rm { background:none; border:none; color:#e57373; font-size:20px; cursor:pointer; line-height:1; }
    .btn-rm:hover { color:#c0392b; }

    /* ── Envio ── */
    .send-area { padding:0 24px 24px; display:flex; align-items:center; gap:14px; }
    .btn-enviar {
      padding:11px 32px; border-radius:8px; border:none; font-size:14px;
      font-family:inherit; font-weight:700; background:var(--emp-color); color:#fff;
      cursor:pointer; transition:opacity .2s;
    }
    .btn-enviar:hover { opacity:.85; }
    .btn-enviar:disabled { background:#aaa; cursor:not-allowed; }
    .send-status { font-size:12px; font-weight:600; }
    .send-status.err { color:var(--red); }
    .enviado-ok {
      display:inline-flex; align-items:center; gap:8px; background:#e6f9ed;
      color:#1a7a3c; font-size:13px; font-weight:700; padding:10px 18px;
      border-radius:8px; margin:0 24px 24px;
    }

    .divider { border:none; border-top:1px solid #f0f0f0; margin:0 24px 20px; }

    .loading { text-align:center; padding:40px; color:#888; font-size:14px; }
    footer { text-align:center; color:#888; font-size:11px; margin-top:32px; }

    /* ── Date Picker customizado ── */
    .prazo-wrap { position:relative; }
    .prazo-display {
      width:100%; border:1.5px solid #e0e0e0; border-radius:6px;
      padding:7px 10px; font-size:13px; font-family:inherit; color:#333;
      background:#fff; cursor:pointer; text-align:left; outline:none;
      transition:border-color .2s; white-space:nowrap; overflow:hidden;
    }
    .prazo-display:hover, .prazo-display:focus { border-color:var(--emp-color); }
    .prazo-display.placeholder { color:#bbb; }

    .cal-popup {
      display:none; position:fixed; z-index:9999;
      background:#fff; border-radius:12px; box-shadow:0 8px 32px rgba(0,0,0,.18);
      padding:16px; width:280px; user-select:none;
    }
    .cal-popup.open { display:block; }

    .cal-nav {
      display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;
    }
    .cal-nav button {
      background:none; border:none; font-size:18px; cursor:pointer; color:#555;
      padding:2px 8px; border-radius:6px; line-height:1;
    }
    .cal-nav button:hover { background:#f0f0f0; }
    .cal-nav__label { font-size:14px; font-weight:700; color:#1d3061; }

    .cal-grid { display:grid; grid-template-columns:32px repeat(7,1fr); gap:2px; }
    .cal-weeknum-header, .cal-day-header {
      font-size:9px; font-weight:700; text-transform:uppercase;
      color:#aaa; text-align:center; padding:4px 2px;
    }
    .cal-weeknum { font-size:9px; color:#aaa; text-align:center; padding:4px 2px; line-height:28px; }
    .cal-day {
      width:32px; height:28px; border-radius:6px; border:none; background:none;
      font-size:12px; color:#333; cursor:pointer; text-align:center; line-height:28px;
      font-family:inherit;
    }
    .cal-day:hover { background:var(--emp-color); color:#fff; opacity:.8; }
    .cal-day.today { border:1.5px solid var(--emp-color); color:var(--emp-color); font-weight:700; }
    .cal-day.selected { background:var(--emp-color); color:#fff; font-weight:700; }
    .cal-day.other-month { color:#ccc; }
    .cal-day:disabled { color:#ddd; cursor:default; }
    .cal-empty { width:32px; height:28px; }

    .cal-week-badge {
      display:inline-block; background:var(--emp-color); color:#fff;
      font-size:10px; font-weight:700; padding:2px 8px; border-radius:20px; margin-top:10px;
    }
    .cal-footer { text-align:center; padding-top:8px; border-top:1px solid #f0f0f0; margin-top:8px; }
  </style>
</head>
<body>

<div class="header">
  <img src="https://res.cloudinary.com/dln0ctawv/image/upload/v1779238658/JCA_1_mp1ic7.png" alt="JCA">
  <span class="header__title">Plano de Ação — Reclamações de Clientes</span>
  <div class="header__right">
    <label>MÊS</label><select id="sel-mes"></select>
    <label>ANO</label><select id="sel-ano"></select>
  </div>
</div>

<div class="container" id="container">
  <div class="loading">Carregando dados...</div>
</div>

<footer>JCA — Inteligência Operacional · Plano de Ação · Reclamações de Clientes</footer>

<div class="cal-popup" id="cal-popup">
  <div class="cal-nav">
    <button onclick="calNav(-1)">&#8592;</button>
    <span class="cal-nav__label" id="cal-label"></span>
    <button onclick="calNav(1)">&#8594;</button>
  </div>
  <div class="cal-grid" id="cal-grid"></div>
  <div class="cal-footer">
    <div id="cal-week-info" style="font-size:12px;color:#555;min-height:20px"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyBoAgfudElHnMLPF9i9aplwc2sd9-zmT3E",
  authDomain:"apresentacoes-indicadores.firebaseapp.com",
  projectId:"apresentacoes-indicadores",
  storageBucket:"apresentacoes-indicadores.firebasestorage.app",
  messagingSenderId:"508186104156",
  appId:"1:508186104156:web:a52ab3848db24c7555b199"
});
var db = firebase.firestore();
var COL_DADOS  = "reclamacoes_cliente";
var COL_PLANOS = "planos_reclamacoes_cliente";

var EMAILJS_SERVICE_ID  = 'service_0kojgve';
var EMAILJS_TEMPLATE_ID = 'template_ddaj648';
var EMAILJS_PUBLIC_KEY  = '9rWOQnvMgz5XPEP1v';
var EMAIL_DESTINO       = 'inteligenciaoperacional@viacaocometa.com.br';

var EMPRESA_NOME = {
  '1001':'Auto Viação 1001','1001u':'Auto Viação 1001 Urbano',
  'cat':'Auto Viação Catarinense','com':'Viação Cometa'
};
var EMP_COLOR = { '1001':'#555555','1001u':'#888888','cat':'#007a7a','com':'#1a5fa0' };
var EMP_LIGHT = {
  '1001':'rgba(85,85,85,.07)','1001u':'rgba(136,136,136,.07)',
  'cat':'rgba(0,122,122,.07)','com':'rgba(26,95,160,.07)'
};
var EMPS = [
  { id:'1001',  logo:'https://res.cloudinary.com/dln0ctawv/image/upload/v1779671790/1001_qisjtr_1_pzpzqw.png' },
  { id:'1001u', logo:'https://res.cloudinary.com/dln0ctawv/image/upload/v1781307419/1001_URB_m1lbdu.png' },
  { id:'cat',   logo:'https://res.cloudinary.com/dln0ctawv/image/upload/v1779671813/AVC_zk4pe9_k4jgau.png' },
  { id:'com',   logo:'https://res.cloudinary.com/dln0ctawv/image/upload/v1779671826/COM_folzln_ddghpr.png' }
];
var MESES_FULL  = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
var MESES_ABREV = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];

// ── Período ──────────────────────────────────────────
var _p = new URLSearchParams(window.location.search);
var _empParam = _p.get('emp');
var now = new Date();
var mesPad = _p.get('mes')!==null ? parseInt(_p.get('mes')) : (now.getMonth()===0?11:now.getMonth()-1);
var anoPad = _p.get('ano')!==null ? parseInt(_p.get('ano')) : (now.getMonth()===0?now.getFullYear()-1:now.getFullYear());

var selMes = document.getElementById('sel-mes');
var selAno = document.getElementById('sel-ano');
MESES_FULL.forEach(function(n,i){
  var o=document.createElement('option'); o.value=i; o.textContent=n;
  if(i===mesPad) o.selected=true; selMes.appendChild(o);
});
[now.getFullYear()-1,now.getFullYear()].forEach(function(a){
  var o=document.createElement('option'); o.value=a; o.textContent=a;
  if(a===anoPad) o.selected=true; selAno.appendChild(o);
});
selMes.addEventListener('change', carregarDados);
selAno.addEventListener('change', carregarDados);

function docId(){ return selAno.value+'-'+String(parseInt(selMes.value)+1).padStart(2,'0'); }
function empsVisiveis(){
  if(_empParam){ var f=EMPS.filter(function(e){return e.id===_empParam;}); return f.length?f:EMPS; }
  return EMPS;
}

// ── Estado local ─────────────────────────────────────
// { empId: { identificacao:'', causas:'', acoes:[{acao,responsavel,prazo}] } }
var _local = {};

// ── Carregar ─────────────────────────────────────────
function carregarDados() {
  var mesIdx = parseInt(selMes.value);
  var mesLabel = MESES_ABREV[mesIdx]+'/'+selAno.value;
  document.getElementById('container').innerHTML = '<div class="loading">Carregando...</div>';

  Promise.all([
    db.collection(COL_DADOS).doc(docId()).get().catch(function(){ return null; }),
    db.collection(COL_PLANOS).doc(docId()).get().catch(function(){ return null; })
  ]).then(function(res) {
    var dadosEmp  = (res[0]&&res[0].exists) ? (res[0].data().dados||{}) : {};
    var planosEmp = (res[1]&&res[1].exists) ? (res[1].data()||{})       : {};

    _local = {};

    var html = empsVisiveis().map(function(emp) {
      var d       = dadosEmp[emp.id]  || {};
      var p       = planosEmp[emp.id] || {};
      var enviado = !!p.enviado;
      var color   = EMP_COLOR[emp.id] || '#1d3061';
      var light   = EMP_LIGHT[emp.id] || 'rgba(0,0,0,.06)';

      // Inicializar estado local
      _local[emp.id] = {
        identificacao: p.identificacao || '',
        causas:        p.causas        || '',
        acoes: (p.acoes||[]).map(function(a){
          return { acao:a.acao||'', responsavel:a.responsavel||'', prazo:a.prazo||'' };
        })
      };

      // Ofensores do mês
      var motivos = (d.motivos_mes||[]).filter(function(m){ return m.descricao; });
      var ofensoresHTML = motivos.length
        ? motivos.map(function(m){
            var q=parseInt(m.qtde)||0;
            return '<div class="desvio-row">'
              +'<span class="desvio-badge">'+(q<10?'0'+q:q)+'</span>'
              +'<span class="desvio-desc">'+m.descricao+'</span>'
              +'<span class="desvio-trat">'+(m.tratamento_pct||'100,0')+'%</span>'
              +'</div>';
          }).join('')
        : '<div class="desvio-row" style="color:#bbb;font-style:italic;font-size:12px">Sem motivos registrados para este período</div>';

      // Linhas de ações
      function rowsHTML(locked) {
        var acoes = _local[emp.id].acoes;
        if (!acoes.length) {
          if (locked) return '<tr><td colspan="4" style="text-align:center;color:#bbb;font-style:italic;padding:16px;font-size:13px">Nenhuma ação registrada</td></tr>';
          return '';
        }
        return acoes.map(function(a, i) {
          if (locked) {
            return '<tr>'
              +'<td style="font-size:13px;color:#333;padding:9px 12px">'+(a.acao||'—')+'</td>'
              +'<td style="font-size:13px;color:#555;text-align:center;padding:9px 12px">'+(a.responsavel||'—')+'</td>'
              +'<td style="font-size:13px;color:#555;text-align:center;padding:9px 12px">'+(a.prazo||'—')+'</td>'
              +'<td></td></tr>';
          }
          return '<tr id="tr-'+emp.id+'-'+i+'">'
            +'<td><textarea rows="2" data-emp="'+emp.id+'" data-idx="'+i+'" data-f="acao" oninput="syncAcao(this);autoH(this)" placeholder="Descreva a ação...">'+(a.acao||'')+'</textarea></td>'
            +'<td><input type="text" data-emp="'+emp.id+'" data-idx="'+i+'" data-f="responsavel" value="'+(a.responsavel||'')+'" placeholder="Nome" oninput="syncAcao(this)"></td>'
            +'<td><div class="prazo-wrap"><button type="button" class="prazo-display'+(a.prazo?'':' placeholder')+'" data-emp="'+emp.id+'" data-idx="'+i+'" data-f="prazo" onclick="openCal(this)" data-val="'+(a.prazo||'')+'">'+(a.prazo||'Selecionar data')+'</button></div></td>'
            +'<td style="text-align:center"><button class="btn-rm" onclick="rmAcao(\''+emp.id+'\','+i+')">&#10005;</button></td>'
            +'</tr>';
        }).join('');
      }

      return '<div class="emp-card" id="card-'+emp.id+'" style="--emp-color:'+color+';--emp-light:'+light+'">'
        // Topo
        +'<div class="emp-card__top">'
        +  '<img src="'+emp.logo+'" class="emp-logo" alt="'+emp.id+'">'
        +  '<span class="emp-mesref">'+mesLabel+'</span>'
        +'</div>'

        // Ofensores
        +'<div class="ofensores-box">'
        +  '<div class="ofensores-box__title">Reclamações do Mês — '+(MESES_FULL[mesIdx]||'')+'</div>'
        +  ofensoresHTML
        +'</div>'

        // Parte 1: Identificação do Desvio + Principais Causas
        +'<div class="desvios-section">'
        +  '<div class="section-label" style="padding:0;margin-bottom:10px">Identificação e Causas dos Desvios</div>'
        +  '<div class="desvios-cols">'
        // Coluna esquerda: Identificação
        +    '<div class="desvios-col">'
        +      '<div class="desvios-col__header">Identificação dos Desvios</div>'
        +      '<div class="desvios-col__body">'
        +        '<textarea id="id-identificacao-'+emp.id+'" data-emp="'+emp.id+'" data-tipo="identificacao"'
        +          (enviado?' disabled':'')
        +          ' placeholder="Descreva os principais desvios identificados..."'
        +          ' oninput="syncDesvio(this)">'+(p.identificacao||'')+'</textarea>'
        +      '</div>'
        +    '</div>'
        // Coluna direita: Causas
        +    '<div class="desvios-col">'
        +      '<div class="desvios-col__header">Principais Causas do Desvio</div>'
        +      '<div class="desvios-col__body">'
        +        '<textarea id="id-causas-'+emp.id+'" data-emp="'+emp.id+'" data-tipo="causas"'
        +          (enviado?' disabled':'')
        +          ' placeholder="Descreva as principais causas dos desvios..."'
        +          ' oninput="syncDesvio(this)">'+(p.causas||'')+'</textarea>'
        +      '</div>'
        +    '</div>'
        +  '</div>'
        +'</div>'

        +'<hr class="divider">'

        // Parte 2: Ações
        +'<div class="acoes-section">'
        +  '<div class="acoes-section__header">'
        +    '<div class="section-label" style="padding:0;margin:0">Ações do Plano</div>'
        +    (!enviado?'<button class="btn-add" onclick="addAcao(\''+emp.id+'\')">+ Adicionar Ação</button>':'')
        +  '</div>'
        +  '<table class="acoes-table" id="tbl-'+emp.id+'">'
        +    '<thead><tr>'
        +      '<th class="col-acao">Ação</th>'
        +      '<th class="col-resp center">Responsável</th>'
        +      '<th class="col-prazo center">Prazo</th>'
        +      '<th class="col-rm"></th>'
        +    '</tr></thead>'
        +    '<tbody id="tbody-'+emp.id+'">'+rowsHTML(enviado)+'</tbody>'
        +  '</table>'
        +'</div>'

        // Envio
        +(enviado
          ? '<div class="enviado-ok">&#10003; Plano enviado com sucesso.</div>'
          : '<div class="send-area">'
          +   '<button class="btn-enviar" id="btn-'+emp.id+'" onclick="enviar(\''+emp.id+'\')">Enviar Plano</button>'
          +   '<span class="send-status" id="status-'+emp.id+'"></span>'
          + '</div>')
        +'</div>';
    }).join('');

    document.getElementById('container').innerHTML = html;
    // Auto-resize textareas existentes
    document.querySelectorAll('textarea').forEach(function(el){ autoH(el); });
  });
}

// ── Auto-resize ───────────────────────────────────────
function autoH(el){ el.style.height='auto'; el.style.height=el.scrollHeight+'px'; }

// ── Sync desvios (identificacao / causas) ─────────────
function syncDesvio(el){
  var emp=el.dataset.emp, tipo=el.dataset.tipo;
  if(_local[emp]) _local[emp][tipo]=el.value;
}

// ── Sync ações ────────────────────────────────────────
function syncAcao(el){
  var emp=el.dataset.emp, idx=parseInt(el.dataset.idx), f=el.dataset.f;
  if(_local[emp]&&_local[emp].acoes&&_local[emp].acoes[idx])
    _local[emp].acoes[idx][f]=el.value;
}

// ── Adicionar ação ────────────────────────────────────
function addAcao(empId){
  if(!_local[empId]) _local[empId]={identificacao:'',causas:'',acoes:[]};
  var idx=_local[empId].acoes.length;
  _local[empId].acoes.push({acao:'',responsavel:'',prazo:'',_prazoRaw:''});
  var tbody=document.getElementById('tbody-'+empId);
  var tr=document.createElement('tr');
  tr.id='tr-'+empId+'-'+idx;
  tr.innerHTML=''
    +'<td><textarea rows="2" data-emp="'+empId+'" data-idx="'+idx+'" data-f="acao" oninput="syncAcao(this);autoH(this)" placeholder="Descreva a ação..."></textarea></td>'
    +'<td><input type="text" data-emp="'+empId+'" data-idx="'+idx+'" data-f="responsavel" placeholder="Nome" oninput="syncAcao(this)"></td>'
    +'<td><div class="prazo-wrap"><button type="button" class="prazo-display placeholder" data-emp="'+empId+'" data-idx="'+idx+'" data-f="prazo" data-val="" onclick="openCal(this)">Selecionar data</button></div></td>'
    +'<td style="text-align:center"><button class="btn-rm" data-remp="'+empId+'" data-ridx="'+idx+'" onclick="_rmClick(this)">&#10005;</button></td>';
  tbody.appendChild(tr);
}


// ── Remover ação ──────────────────────────────────────
function rmAcao(empId, idx){
  if(_local[empId]&&_local[empId].acoes) _local[empId].acoes.splice(idx,1);
  var tbody=document.getElementById('tbody-'+empId);
  var acoes=_local[empId].acoes||[];
  tbody.innerHTML=acoes.map(function(a,i){
    return '<tr id="tr-'+empId+'-'+i+'">'
      +'<td><textarea rows="2" data-emp="'+empId+'" data-idx="'+i+'" data-f="acao" oninput="syncAcao(this);autoH(this)" placeholder="Descreva a ação...">'+(a.acao||'')+'</textarea></td>'
      +'<td><input type="text" data-emp="'+empId+'" data-idx="'+i+'" data-f="responsavel" value="'+(a.responsavel||'')+'" placeholder="Nome" oninput="syncAcao(this)"></td>'
      +'<td><div class="prazo-wrap"><button type="button" class="prazo-display'+(a.prazo?'':' placeholder')+'" data-emp="'+empId+'" data-idx="'+i+'" data-f="prazo" data-val="'+(a._prazoRaw||'')+'" onclick="openCal(this)">'+(a.prazo||'Selecionar data')+'</button></div></td>'
      +'<td style="text-align:center"><button class="btn-rm" data-remp="'+empId+'" data-ridx="'+i+'" onclick="_rmClick(this)">&#10005;</button></td>'
      +'</tr>';
  }).join('');
  document.querySelectorAll('#tbody-'+empId+' textarea').forEach(function(el){ autoH(el); });
}


// ── Enviar plano ──────────────────────────────────────
function enviar(empId){
  var loc    = _local[empId]||{};
  var identificacao = (document.getElementById('id-identificacao-'+empId)||{}).value || loc.identificacao || '';
  var causas        = (document.getElementById('id-causas-'+empId)||{}).value        || loc.causas        || '';
  var acoes  = (loc.acoes||[]).filter(function(a){ return (a.acao||'').trim(); });

  var btn    = document.getElementById('btn-'+empId);
  var status = document.getElementById('status-'+empId);

  if (!identificacao.trim() && !causas.trim() && !acoes.length) {
    status.textContent='⚠️ Preencha ao menos um campo.'; status.className='send-status err'; return;
  }

  btn.disabled=true; btn.textContent='Enviando...'; status.textContent='';

  // Salvar como objeto aninhado (não dot-notation) para leitura correta
  var payload={};
  payload[empId]={
    identificacao: identificacao,
    causas:        causas,
    acoes:         acoes,
    texto:         acoes.map(function(a){return a.acao;}).join(';\n'),
    enviado:       true,
    enviadoEm:     new Date().toISOString()
  };

  db.collection(COL_PLANOS).doc(docId()).set(payload,{merge:true})
    .then(function(){
      var sendArea=document.querySelector('#card-'+empId+' .send-area');
      if(sendArea) sendArea.remove();
      document.getElementById('card-'+empId).insertAdjacentHTML('beforeend','<div class="enviado-ok">&#10003; Plano enviado com sucesso.</div>');
      // Bloquear campos
      ['id-identificacao-'+empId,'id-causas-'+empId].forEach(function(id){
        var el=document.getElementById(id); if(el) el.disabled=true;
      });
      _enviarEmail(empId, identificacao, causas, acoes);
    })
    .catch(function(e){
      btn.disabled=false; btn.textContent='Enviar Plano';
      status.textContent='❌ Erro: '+e.message; status.className='send-status err';
    });
}

// ── Calendário customizado com semana ────────────────
var _calTarget = null;  // botão que abriu o cal
var _calDate   = new Date();

function getWeekNumber(d) {
  var date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  var dayNum = date.getUTCDay() || 7;
  date.setUTCDate(date.getUTCDate() + 4 - dayNum);
  var yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
  return Math.ceil((((date - yearStart) / 86400000) + 1) / 7);
}

function openCal(btn) {
  _calTarget = btn;
  var popup = document.getElementById('cal-popup');

  // Posicionar popup abaixo do botão — usa fixed, sem scrollY/X
  var rect = btn.getBoundingClientRect();
  var top  = rect.bottom + 6;
  var left = rect.left;
  if (left + 290 > window.innerWidth) left = window.innerWidth - 295;
  if (top + 320 > window.innerHeight) top = rect.top - 326; // abre para cima se não couber
  popup.style.top  = top + 'px';
  popup.style.left = left + 'px';

  // Pegar cor da empresa pelo card pai
  var card = btn.closest('.emp-card');
  var empColor = '#1d3061';
  if (card) {
    var style = card.getAttribute('style') || '';
    var match = style.match(/--emp-color:\s*([^;]+)/);
    if (match) empColor = match[1].trim();
  }
  popup.style.cssText += ';--emp-color:' + empColor;

  // Iniciar calendário no mês da data selecionada, ou mês atual
  var val = btn.dataset.val;
  if (val && /^\d{4}-\d{2}-\d{2}$/.test(val)) {
    var parts = val.split('-');
    _calDate = new Date(parseInt(parts[0]), parseInt(parts[1])-1, 1);
  } else {
    _calDate = new Date();
    _calDate.setDate(1);
  }

  popup.classList.add('open');
  renderCal();

  // Fechar ao clicar fora
  setTimeout(function(){
    document.addEventListener('click', closeCal, { once:true, capture:true });
  }, 50);
}

function closeCal(e) {
  var popup = document.getElementById('cal-popup');
  if (!popup) return;
  // Se clicou num dia do calendário, deixa o _calClick processar primeiro
  if (e.target.classList.contains('cal-day') || e.target.closest && e.target.closest('.cal-day')) return;
  if (!popup.contains(e.target)) {
    popup.classList.remove('open');
  } else {
    setTimeout(function(){
      document.addEventListener('click', closeCal, { once:true, capture:true });
    }, 50);
  }
}

function calNav(dir) {
  _calDate.setMonth(_calDate.getMonth() + dir);
  renderCal();
}

function renderCal() {
  var year  = _calDate.getFullYear();
  var month = _calDate.getMonth();
  var meses = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho",
               "Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
  document.getElementById('cal-label').textContent = meses[month] + ' ' + year;

  var today   = new Date();
  var selVal  = _calTarget ? _calTarget.dataset.val : '';
  var selDate = selVal && selVal.match(/^\d{4}-\d{2}-\d{2}$/) ? new Date(selVal+'T12:00:00') : null;

  // Cabeçalho: Sem + Seg a Dom (semana começa na segunda)
  var diasHeader = ['SEG','TER','QUA','QUI','SEX','SÁB','DOM'];
  var html = '<div class="cal-weeknum-header">SEM</div>';
  diasHeader.forEach(function(d){ html += '<div class="cal-day-header">'+d+'</div>'; });

  // Primeiro dia do mês — ajustar para semana começar na Segunda (0=Dom,1=Seg,...6=Sáb)
  var firstDayJS   = new Date(year, month, 1).getDay(); // 0=Dom..6=Sáb
  var firstDayMon  = (firstDayJS + 6) % 7; // 0=Seg..6=Dom
  var daysInMonth  = new Date(year, month+1, 0).getDate();
  var daysInPrev   = new Date(year, month, 0).getDate();

  // Construir array de células
  var cells = [];
  for (var i = firstDayMon - 1; i >= 0; i--) {
    cells.push({ day: daysInPrev - i, delta: -1 });
  }
  for (var d = 1; d <= daysInMonth; d++) {
    cells.push({ day: d, delta: 0 });
  }
  var nx = 1;
  while (cells.length % 7 !== 0) {
    cells.push({ day: nx++, delta: 1 });
  }

  // Renderizar por semanas
  for (var r = 0; r < cells.length; r += 7) {
    var cell0    = cells[r];
    var refMonth = month + cell0.delta;
    var refYear  = year;
    if (refMonth < 0)  { refMonth = 11; refYear--; }
    if (refMonth > 11) { refMonth = 0;  refYear++; }
    var weekDate = new Date(refYear, refMonth, cell0.day);
    var weekNum  = getWeekNumber(weekDate);
    html += '<div class="cal-weeknum">'+weekNum+'</div>';

    for (var col = 0; col < 7; col++) {
      var cell     = cells[r + col];
      var cMonth   = month + cell.delta;
      var cYear    = year;
      if (cMonth < 0)  { cMonth = 11; cYear--; }
      if (cMonth > 11) { cMonth = 0;  cYear++; }
      var dateStr  = cYear+'-'+String(cMonth+1).padStart(2,'0')+'-'+String(cell.day).padStart(2,'0');
      var isToday  = cell.delta===0 && cell.day===today.getDate() && cMonth===today.getMonth() && cYear===today.getFullYear();
      var isSel    = selDate && dateStr === (selDate.getFullYear()+'-'+String(selDate.getMonth()+1).padStart(2,'0')+'-'+String(selDate.getDate()).padStart(2,'0'));
      var cls      = 'cal-day'+(cell.delta!==0?' other-month':'')+(isToday?' today':'')+(isSel?' selected':'');
      html += '<button type="button" class="'+cls+'" data-date="'+dateStr+'" onclick="_calClick(this)">'+cell.day+'</button>';
    }
  }
  document.getElementById('cal-grid').innerHTML = html;
  document.getElementById('cal-week-info').innerHTML = selDate
    ? '&#128197; <strong>Semana '+getWeekNumber(selDate)+'</strong> selecionada'
    : '<span style="color:#bbb">Selecione uma data</span>';
}

function _calClick(btn) { selectDate(btn.dataset.date); }
function _rmClick(btn)  { rmAcao(btn.dataset.remp, parseInt(btn.dataset.ridx)); }

function selectDate(dateStr) {
  if (!_calTarget) return;
  // Formatar para exibição: "15/Jun/2026 · Sem 25"
  var d    = new Date(dateStr+'T12:00:00');
  var sem  = getWeekNumber(d);
  var display = 'Semana ' + sem;

  _calTarget.textContent  = display;
  _calTarget.dataset.val  = dateStr;
  _calTarget.classList.remove('placeholder');

  // Sincronizar com _local (guardar display e data ISO)
  var emp = _calTarget.dataset.emp;
  var idx2 = parseInt(_calTarget.dataset.idx);
  _calTarget.dataset.val = dateStr; // data ISO para reabrir no mês certo
  if (_local[emp] && _local[emp].acoes && _local[emp].acoes[idx2]) {
    _local[emp].acoes[idx2]['prazo']    = display;
    _local[emp].acoes[idx2]['_prazoRaw'] = dateStr;
  }

  document.getElementById('cal-week-info').innerHTML =
    '&#128197; Semana <span class="cal-week-badge">'+sem+'</span>';

  // Fechar imediatamente
  document.getElementById('cal-popup').classList.remove('open');
}
